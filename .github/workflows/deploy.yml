name: Deploy StockTrack

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Actualizar repositorio en la VM
        run: |
          cd ~/proyecto_final_idt
          git pull origin main

      - name: Instalar dependencias del backend
        run: |
          cd ~/proyecto_final_idt/server
          npm install
          npx prisma generate
          npx prisma migrate deploy
          pm2 restart stocktrack-api || pm2 start src/server.js --name stocktrack-api
          pm2 save

      - name: Compilar frontend
        run: |
          cd ~/proyecto_final_idt/cliente
          npm install
          npm run build

      - name: Publicar frontend en Nginx
        run: |
          sudo rm -rf /var/www/stocktrack/*
          sudo cp -r ~/proyecto_final_idt/cliente/dist/* /var/www/stocktrack/
          sudo systemctl restart nginx
